<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>RAS Approach Graph</title>

  <link rel="stylesheet" href="assets/theme.css">

  <style>
    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .ship-section {
      margin-bottom: 18px;
    }

    .section-subtitle {
      font-size: clamp(16px, 3vw, 19px);
      font-weight: bold;
      color: var(--text-main);
      margin: 0 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }

    .unit-row {
      display: grid;
      grid-template-columns: 1fr 0.55fr;
      gap: 10px;
      align-items: end;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .summary-box {
      background: var(--bg-card);
      border: 1px solid var(--border-main);
      border-radius: 12px;
      padding: 14px;
      line-height: 1.5;
    }

    .summary-label {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 5px;
    }

    .summary-value {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: bold;
      color: var(--text-main);
    }

    .graph-scroll {
      width: 100%;
      overflow: auto;
      margin-top: 16px;
      border: 1px solid var(--border-main);
      border-radius: 12px;
      background: var(--bg-input);
      padding: 10px;
    }

    .ras-svg {
      display: block;
      max-width: none;
      background: #dff2d8;
      border: 1px solid #356b35;
    }

    .note {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 12px;
    }

    @media (min-width: 760px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <a
    href="index.html"
    class="home-btn"
    aria-label="Back to home"
  >×</a>

  <div class="app-container">
    <h1 class="page-title">RAS Approach Graph</h1>

    <div class="card">
      <div class="card-title">Inputs</div>

      <div class="ship-section">
        <div class="section-subtitle">Receiving Ship Data</div>

        <div class="input-grid">
          <div>
            <label>Length Overall of Receiving Ship (m)</label>
            <input id="rLOA" type="number" inputmode="decimal" step="0.1" placeholder="160">
          </div>

          <div>
            <label>Stem to Standard of Receiving Ship (m)</label>
            <input id="rStandard" type="number" inputmode="decimal" step="0.1" placeholder="45">
          </div>

          <div>
            <label>Stem to RAS Point of Receiving Ship (m)</label>
            <input id="rRAS" type="number" inputmode="decimal" step="0.1" placeholder="75">
          </div>

          <div>
            <label>Beam of Receiving Ship (m)</label>
            <input id="rBeam" type="number" inputmode="decimal" step="0.1" placeholder="22">
          </div>
        </div>
      </div>

      <div class="ship-section">
        <div class="section-subtitle">Delivery Ship Data</div>

        <div class="input-grid">
          <div>
            <label>Length Overall of Delivery Ship (m)</label>
            <input id="dLOA" type="number" inputmode="decimal" step="0.1" placeholder="200">
          </div>

          <div>
            <label>Stem to Standard of Delivery Ship (m)</label>
            <input id="dStandard" type="number" inputmode="decimal" step="0.1" placeholder="60">
          </div>

          <div>
            <label>Stem to RAS Point of Delivery Ship (m)</label>
            <input id="dRAS" type="number" inputmode="decimal" step="0.1" placeholder="90">
          </div>

          <div>
            <label>Beam of Delivery Ship (m)</label>
            <input id="dBeam" type="number" inputmode="decimal" step="0.1" placeholder="30">
          </div>
        </div>
      </div>

      <div class="ship-section">
        <div class="section-subtitle">RAS Approach Data</div>

        <div class="input-grid">
          <div>
            <label>RAS Speed K1 (kn)</label>
            <input id="rasSpeed" type="number" inputmode="decimal" step="0.1" placeholder="12">
          </div>

          <div>
            <label>Approach Speed K2 (kn)</label>
            <input id="approachSpeed" type="number" inputmode="decimal" step="0.1" placeholder="15">
          </div>

          <div>
            <label>Surge Rate of Receiving Ship (yards per kn)</label>
            <input id="surgeRate" type="number" inputmode="decimal" step="0.1" placeholder="80">
          </div>

          <div class="unit-row">
            <div>
              <label>Required Lateral Separation</label>
              <input id="lateralSeparation" type="number" inputmode="decimal" step="0.1" placeholder="60">
            </div>

            <div>
              <label>Unit</label>
              <select id="lateralUnit">
                <option value="m">m</option>
                <option value="ft">ft</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <button id="goBtn" class="go-btn" type="button">GO</button>

      <div id="result" class="result">
        Enter ship data and approach data to generate RAS graph.
      </div>
    </div>
  </div>

  <script>
    "use strict";

    const goBtn = document.getElementById("goBtn");
    const resultBox = document.getElementById("result");

    const inputIds = [
      "rLOA",
      "rStandard",
      "rRAS",
      "rBeam",
      "dLOA",
      "dStandard",
      "dRAS",
      "dBeam",
      "rasSpeed",
      "approachSpeed",
      "surgeRate",
      "lateralSeparation"
    ];

    document
      .querySelectorAll("input, select")
      .forEach((control) => {
        control.addEventListener("input", updateButton);
        control.addEventListener("change", updateButton);
      });

    goBtn.addEventListener("click", calculate);

    function valueOf(id) {
      return Number(document.getElementById(id).value);
    }

    function formatNumber(value, decimals = 2) {
      return Number(value).toFixed(decimals);
    }

    function formatMeters(value) {
      return `${formatNumber(value, 2)} m`;
    }

    function getInputs() {
      const lateralValue = valueOf("lateralSeparation");
      const lateralUnit = document.getElementById("lateralUnit").value;

      const lateralSeparationM =
        lateralUnit === "ft"
          ? lateralValue * 0.3048
          : lateralValue;

      return {
        receiving: {
          loa: valueOf("rLOA"),
          standard: valueOf("rStandard"),
          ras: valueOf("rRAS"),
          beam: valueOf("rBeam")
        },

        delivery: {
          loa: valueOf("dLOA"),
          standard: valueOf("dStandard"),
          ras: valueOf("dRAS"),
          beam: valueOf("dBeam")
        },

        rasSpeed: valueOf("rasSpeed"),
        approachSpeed: valueOf("approachSpeed"),
        surgeRateYardsPerKn: valueOf("surgeRate"),
        lateralSeparationM
      };
    }

    function getValidationMessage() {
      for (const id of inputIds) {
        const value = valueOf(id);

        if (!Number.isFinite(value)) {
          return "Complete all input fields.";
        }
      }

      const data = getInputs();
      const r = data.receiving;
      const d = data.delivery;

      if (r.loa <= 0 || d.loa <= 0) {
        return "Recheck LOA values.";
      }

      if (r.beam <= 0 || d.beam <= 0) {
        return "Recheck beam values.";
      }

      if (r.standard < 0 || r.standard > r.loa) {
        return "Recheck receiving ship stem to standard distance.";
      }

      if (d.standard < 0 || d.standard > d.loa) {
        return "Recheck delivery ship stem to standard distance.";
      }

      if (r.ras < 0 || r.ras > r.loa) {
        return "Recheck receiving ship stem to RAS point distance.";
      }

      if (d.ras < 0 || d.ras > d.loa) {
        return "Recheck delivery ship stem to RAS point distance.";
      }

      if (data.rasSpeed <= 0) {
        return "Recheck RAS speed K1.";
      }

      if (data.approachSpeed <= 0) {
        return "Recheck approach speed K2.";
      }

      if (data.approachSpeed <= data.rasSpeed) {
        return "Approach speed K2 must be greater than RAS speed K1.";
      }

      if (data.surgeRateYardsPerKn < 0) {
        return "Recheck surge rate.";
      }

      if (data.lateralSeparationM <= 0) {
        return "Recheck required lateral separation.";
      }

      return "";
    }

    function isValid() {
      return getValidationMessage() === "";
    }

    function updateButton() {
      goBtn.classList.toggle("valid", isValid());
    }

    function niceCeiling(value) {
      if (value <= 0) return 1;

      const exponent = Math.floor(Math.log10(value));
      const base = Math.pow(10, exponent);
      const normal = value / base;

      if (normal <= 1) return 1 * base;
      if (normal <= 2) return 2 * base;
      if (normal <= 5) return 5 * base;

      return 10 * base;
    }

    function makeLine(x1, y1, x2, y2, stroke, width, dash = "") {
      return `
        <line
          x1="${x1}"
          y1="${y1}"
          x2="${x2}"
          y2="${y2}"
          stroke="${stroke}"
          stroke-width="${width}"
          ${dash ? `stroke-dasharray="${dash}"` : ""}
        />
      `;
    }

    function makeText(x, y, text, size, anchor = "middle", fill = "#111") {
      return `
        <text
          x="${x}"
          y="${y}"
          font-size="${size}"
          text-anchor="${anchor}"
          fill="${fill}"
          font-family="Arial, sans-serif"
        >${text}</text>
      `;
    }

    function shipPath(cx, stemY, loa, beam) {
      const shoulder = Math.min(loa * 0.10, beam * 1.25);
      const halfBeam = beam / 2;

      return `
        M ${cx} ${stemY}
        L ${cx + halfBeam} ${stemY + shoulder}
        L ${cx + halfBeam} ${stemY + loa}
        L ${cx - halfBeam} ${stemY + loa}
        L ${cx - halfBeam} ${stemY + shoulder}
        Z
      `;
    }

    function renderShip(options) {
      const {
        cx,
        stemY,
        loa,
        beam,
        standard,
        ras,
        label,
        rasSide,
        fill,
        stroke,
        dash,
        mPerCm
      } = options;

      const halfBeam = beam / 2;
      const normalStroke = mPerCm / 25;
      const thinStroke = mPerCm / 45;
      const labelSize = Math.max(mPerCm * 0.32, 2.5);
      const smallSize = Math.max(mPerCm * 0.24, 2.2);

      const rasX =
        rasSide === "right"
          ? cx + halfBeam
          : cx - halfBeam;

      const rasY = stemY + ras;
      const standardY = stemY + standard;

      const rasLabelX =
        rasSide === "right"
          ? rasX + mPerCm * 0.35
          : rasX - mPerCm * 0.35;

      const rasLabelAnchor =
        rasSide === "right"
          ? "start"
          : "end";

      return `
        <path
          d="${shipPath(cx, stemY, loa, beam)}"
          fill="${fill}"
          stroke="${stroke}"
          stroke-width="${normalStroke}"
          ${dash ? `stroke-dasharray="${dash}"` : ""}
        />

        ${makeLine(
          cx,
          stemY,
          cx,
          stemY + loa,
          stroke,
          thinStroke,
          "4 4"
        )}

        ${makeLine(
          cx - halfBeam,
          standardY,
          cx + halfBeam,
          standardY,
          "#111",
          thinStroke
        )}

        ${makeText(
          cx,
          stemY - (mPerCm * 0.25),
          "STEM",
          smallSize,
          "middle"
        )}

        ${makeText(
          cx,
          stemY + loa + (mPerCm * 0.5),
          label,
          labelSize,
          "middle"
        )}

        ${makeText(
          cx,
          standardY - (mPerCm * 0.15),
          "STANDARD",
          smallSize,
          "middle"
        )}

        <circle
          cx="${rasX}"
          cy="${rasY}"
          r="${Math.max(mPerCm * 0.10, 1.2)}"
          fill="#111"
        />

        ${makeText(
          rasLabelX,
          rasY - (mPerCm * 0.15),
          "RAS POINT",
          smallSize,
          rasLabelAnchor
        )}
      `;
    }

    function renderGrid(minX, minY, maxX, maxY, mPerCm) {
      const major = mPerCm;
      const minor = mPerCm / 10;
      const thinStroke = mPerCm / 150;
      const majorStroke = mPerCm / 65;

      let grid = `
        <rect
          x="${minX}"
          y="${minY}"
          width="${maxX - minX}"
          height="${maxY - minY}"
          fill="#dff2d8"
        />
      `;

      const startX = Math.floor(minX / minor) * minor;
      const endX = Math.ceil(maxX / minor) * minor;
      const startY = Math.floor(minY / minor) * minor;
      const endY = Math.ceil(maxY / minor) * minor;

      for (let x = startX; x <= endX; x += minor) {
        const isMajor =
          Math.abs((x / major) - Math.round(x / major)) < 0.0001;

        grid += makeLine(
          x,
          minY,
          x,
          maxY,
          isMajor ? "#3b873b" : "#91c891",
          isMajor ? majorStroke : thinStroke
        );
      }

      for (let y = startY; y <= endY; y += minor) {
        const isMajor =
          Math.abs((y / major) - Math.round(y / major)) < 0.0001;

        grid += makeLine(
          minX,
          y,
          maxX,
          y,
          isMajor ? "#3b873b" : "#91c891",
          isMajor ? majorStroke : thinStroke
        );
      }

      return grid;
    }

    function renderGraph(data) {
      const r = data.receiving;
      const d = data.delivery;

      const speedAdvantage =
        data.approachSpeed - data.rasSpeed;

      const surgeRateMPerKn =
        data.surgeRateYardsPerKn * 0.9144;

      const surgeDistance =
        surgeRateMPerKn * speedAdvantage;

      const centrelineSeparation =
        (r.beam / 2) +
        data.lateralSeparationM +
        (d.beam / 2);

      const receivingCx = 0;
      const deliveryCx = centrelineSeparation;

      const deliveryStemY = 0;
      const deliveryRasY = deliveryStemY + d.ras;

      const receivingFinalStemY =
        deliveryRasY - r.ras;

      const receivingOrderStemY =
        deliveryRasY + surgeDistance - r.ras;

      const margin =
        Math.max(20, Math.max(r.beam, d.beam, data.lateralSeparationM) * 0.65);

      const minX =
        Math.min(
          receivingCx - r.beam / 2,
          deliveryCx - d.beam / 2
        ) - margin;

      const maxX =
        Math.max(
          receivingCx + r.beam / 2,
          deliveryCx + d.beam / 2
        ) + margin;

      const minY =
        Math.min(
          deliveryStemY,
          receivingOrderStemY,
          receivingFinalStemY
        ) - margin;

      const maxY =
        Math.max(
          deliveryStemY + d.loa,
          receivingOrderStemY + r.loa,
          receivingFinalStemY + r.loa
        ) + margin;

      const graphWidthM = maxX - minX;
      const graphHeightM = maxY - minY;

      const mPerCm =
        niceCeiling(
          Math.max(
            graphWidthM / 25,
            graphHeightM / 32
          )
        );

      const widthCm = graphWidthM / mPerCm;
      const heightCm = graphHeightM / mPerCm;

      const normalStroke = mPerCm / 25;
      const thinStroke = mPerCm / 45;
      const labelSize = Math.max(mPerCm * 0.32, 2.8);
      const smallSize = Math.max(mPerCm * 0.24, 2.2);

      const receivingRasX = receivingCx + r.beam / 2;
      const receivingRasYOrder =
        receivingOrderStemY + r.ras;

      const receivingRasYFinal =
        receivingFinalStemY + r.ras;

      const deliveryRasX =
        deliveryCx - d.beam / 2;

      const lateralDimY =
        deliveryRasY - (mPerCm * 0.65);

      const surgeDimX =
        receivingRasX +
        Math.max(data.lateralSeparationM * 0.35, mPerCm * 0.8);

      const svg = `
        <svg
          class="ras-svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="${minX} ${minY} ${graphWidthM} ${graphHeightM}"
          style="width:${widthCm.toFixed(2)}cm; height:${heightCm.toFixed(2)}cm;"
        >
          <defs>
            <marker
              id="arrowEnd"
              markerWidth="8"
              markerHeight="8"
              refX="8"
              refY="4"
              orient="auto"
              markerUnits="strokeWidth"
            >
              <path d="M 0 0 L 8 4 L 0 8 Z" fill="#111" />
            </marker>

            <marker
              id="arrowStart"
              markerWidth="8"
              markerHeight="8"
              refX="0"
              refY="4"
              orient="auto"
              markerUnits="strokeWidth"
            >
              <path d="M 8 0 L 0 4 L 8 8 Z" fill="#111" />
            </marker>
          </defs>

          ${renderGrid(minX, minY, maxX, maxY, mPerCm)}

          ${renderShip({
            cx: deliveryCx,
            stemY: deliveryStemY,
            loa: d.loa,
            beam: d.beam,
            standard: d.standard,
            ras: d.ras,
            label: "DELIVERY SHIP",
            rasSide: "left",
            fill: "#fff3dc",
            stroke: "#1a1a1a",
            dash: "",
            mPerCm
          })}

          ${renderShip({
            cx: receivingCx,
            stemY: receivingFinalStemY,
            loa: r.loa,
            beam: r.beam,
            standard: r.standard,
            ras: r.ras,
            label: "FINAL RAS ALIGNMENT",
            rasSide: "right",
            fill: "rgba(255,255,255,0.15)",
            stroke: "#555",
            dash: "8 6",
            mPerCm
          })}

          ${renderShip({
            cx: receivingCx,
            stemY: receivingOrderStemY,
            loa: r.loa,
            beam: r.beam,
            standard: r.standard,
            ras: r.ras,
            label: "RECEIVING SHIP - ORDER DOWN POSITION",
            rasSide: "right",
            fill: "#dbeaff",
            stroke: "#1a1a1a",
            dash: "",
            mPerCm
          })}

          ${makeLine(
            receivingCx + r.beam / 2,
            lateralDimY,
            deliveryCx - d.beam / 2,
            lateralDimY,
            "#111",
            normalStroke
          )}

          <line
            x1="${receivingCx + r.beam / 2}"
            y1="${lateralDimY}"
            x2="${deliveryCx - d.beam / 2}"
            y2="${lateralDimY}"
            stroke="#111"
            stroke-width="${normalStroke}"
            marker-start="url(#arrowStart)"
            marker-end="url(#arrowEnd)"
          />

          ${makeText(
            (receivingCx + r.beam / 2 + deliveryCx - d.beam / 2) / 2,
            lateralDimY - (mPerCm * 0.25),
            `Z = ${formatNumber(data.lateralSeparationM, 1)} m`,
            smallSize
          )}

          <line
            x1="${surgeDimX}"
            y1="${receivingRasYOrder}"
            x2="${surgeDimX}"
            y2="${receivingRasYFinal}"
            stroke="#111"
            stroke-width="${normalStroke}"
            marker-start="url(#arrowStart)"
            marker-end="url(#arrowEnd)"
          />

          ${makeLine(
            receivingRasX,
            receivingRasYOrder,
            surgeDimX,
            receivingRasYOrder,
            "#111",
            thinStroke,
            "5 5"
          )}

          ${makeLine(
            receivingRasX,
            receivingRasYFinal,
            surgeDimX,
            receivingRasYFinal,
            "#111",
            thinStroke,
            "5 5"
          )}

          ${makeText(
            surgeDimX + (mPerCm * 0.35),
            (receivingRasYOrder + receivingRasYFinal) / 2,
            `S = ${formatNumber(surgeDistance, 1)} m`,
            smallSize,
            "start"
          )}

          ${makeLine(
            receivingRasX,
            receivingRasYFinal,
            deliveryRasX,
            deliveryRasY,
            "#111",
            thinStroke,
            "5 5"
          )}

          ${makeText(
            minX + (mPerCm * 0.5),
            minY + (mPerCm * 0.8),
            `Scale: 1 cm = ${formatNumber(mPerCm, 2)} m`,
            labelSize,
            "start"
          )}

          ${makeText(
            minX + (mPerCm * 0.5),
            minY + (mPerCm * 1.3),
            `Minor grid: 1 mm = ${formatNumber(mPerCm / 10, 2)} m`,
            smallSize,
            "start"
          )}

          ${makeText(
            maxX - (mPerCm * 0.5),
            minY + (mPerCm * 0.8),
            "Not to be used for navigation without verification",
            smallSize,
            "end",
            "#7a1f1f"
          )}
        </svg>
      `;

      return {
        svg,
        surgeDistance,
        surgeRateMPerKn,
        speedAdvantage,
        centrelineSeparation,
        mPerCm
      };
    }

    function showWarning(message) {
      resultBox.innerHTML =
        `<span class="warning">${message}</span>`;
    }

    function calculate() {
      const validationMessage = getValidationMessage();

      if (validationMessage !== "") {
        showWarning(validationMessage);
        updateButton();
        return;
      }

      const data = getInputs();
      const graph = renderGraph(data);

      const output = `
        <div class="success">RAS approach graph generated.</div>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">Speed advantage</div>
            <div class="summary-value">${formatNumber(graph.speedAdvantage, 2)} kn</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">Surge distance S</div>
            <div class="summary-value">${formatMeters(graph.surgeDistance)}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">Centreline separation</div>
            <div class="summary-value">${formatMeters(graph.centrelineSeparation)}</div>
          </div>
        </div>

        <div class="note">
          Order the receiving ship to come down to RAS speed when its RAS point is
          <strong>${formatMeters(graph.surgeDistance)}</strong> abaft the delivery ship RAS point.
          After surge, both RAS points will be abeam at the entered lateral separation.
        </div>

        <div class="graph-scroll">
          ${graph.svg}
        </div>

        <div class="note">
          Scale used: 1 cm = ${formatNumber(graph.mPerCm, 2)} m.
          The green graph paper uses 1 cm major blocks and 1 mm minor divisions.
        </div>
      `;

      resultBox.innerHTML = output;
      updateButton();
    }

    updateButton();
  </script>
</body>
</html>
