<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigator's Assistant</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #101820;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding-top: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      color: #cfcfcf;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .section-title {
      margin-top: 28px;
      margin-bottom: 12px;
      font-size: 16px;
      color: #d0d0d0;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
    }

    .menu {
      display: grid;
      gap: 14px;
    }

    .menu a {
      display: block;
      text-decoration: none;
      background: #1f6feb;
      color: white;
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    .menu a:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Navigator's Assistant</h1>
    <div class="subtitle">Offline HTML Navigation Tools</div>

    <div class="section-title">Navigation Calculators</div>

    <div class="menu">
      <a href="wheel-over-bearing-calculator.html">Wheel Over Bearing Calculator</a>
      <a href="hot-calculator.html">HOT and TOT Calculator</a>
    </div>
  </div>
</body>
</html>
