<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel Over Bearing Calculator</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    header {
      background: #0f172a;
      color: #ffffff;
      padding: 16px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    main {
      max-width: 850px;
      margin: 18px auto;
      padding: 0 14px 28px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
      padding: 16px;
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      padding: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    input.field-error {
      border-color: #dc2626;
    }

    input.field-ok {
      border-color: #16a34a;
    }

    .actions {
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 24px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
      min-width: 110px;
    }

    button.ok { background: #16a34a; }
    button.bad { background: #dc2626; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid #d1d5db;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: left; }

    th {
      background: #f9fafb;
      font-size: 14px;
    }

    @media (max-width: 650px) {
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 21px; }
      th, td { font-size: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Wheel Over Bearing Calculator</h1>
  </header>

  <main>
    <section class="panel">
      <div class="form-grid">
        <div>
          <label for="course">Course of Ship</label>
          <input id="course" type="text" inputmode="decimal" autocomplete="off" />
        </div>

        <div>
          <label for="fixBearing">Bearing of Fixing mark from wheel over</label>
          <input id="fixBearing" type="text" inputmode="decimal" autocomplete="off" />
        </div>

        <div>
          <label for="fixRange">Range of fixing mark from wheel over (in Cables)</label>
          <input id="fixRange" type="text" inputmode="decimal" autocomplete="off" />
        </div>

        <div>
          <label for="legLength">Length of Leg (in cables)</label>
          <input id="legLength" type="text" inputmode="decimal" autocomplete="off" />
        </div>
      </div>

      <div class="actions">
        <button id="goBtn" class="bad">Go</button>
      </div>
    </section>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Distance to Wheel Over</th>
              <th>Bearing of Fixing Mark</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const inputs = {
      course: document.getElementById('course'),
      fixBearing: document.getElementById('fixBearing'),
      fixRange: document.getElementById('fixRange'),
      legLength: document.getElementById('legLength')
    };

    const goBtn = document.getElementById('goBtn');
    const resultsBody = document.getElementById('resultsBody');

    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }
    function norm360(deg) { return ((deg % 360) + 360) % 360; }

    function fmtBearing(deg) {
      const value = norm360(deg);
      const fixed = value.toFixed(1);
      const parts = fixed.split('.');
      return parts[0].padStart(3, '0') + '.' + parts[1] + '°T';
    }

    function fmtC(value) {
      const fixed = Number(value).toFixed(2);
      return fixed.replace(/\.00$/, '').replace(/(\.\d)0$/, '$1') + ' C';
    }

    function parseNumber(input) {
      const text = input.value.trim();
      if (!/^(\d+(\.\d*)?|\.\d+)$/.test(text)) return NaN;
      return Number(text);
    }

    function getValidation() {
      const course = parseNumber(inputs.course);
      const fixBearing = parseNumber(inputs.fixBearing);
      const fixRange = parseNumber(inputs.fixRange);
      const legLength = parseNumber(inputs.legLength);

      const valid = {
        course: Number.isFinite(course) && course >= 0 && course < 360,
        fixBearing: Number.isFinite(fixBearing) && fixBearing >= 0 && fixBearing < 360,
        fixRange: Number.isFinite(fixRange) && fixRange > 0,
        legLength: Number.isFinite(legLength) && legLength >= 0.5
      };

      return {
        allValid: Object.values(valid).every(Boolean),
        valid,
        values: { course, fixBearing, fixRange, legLength }
      };
    }

    function updateButtonState() {
      const status = getValidation();

      Object.keys(inputs).forEach(key => {
        inputs[key].classList.remove('field-ok', 'field-error');
        if (inputs[key].value.trim() !== '') {
          inputs[key].classList.add(status.valid[key] ? 'field-ok' : 'field-error');
        }
      });

      goBtn.classList.toggle('ok', status.allValid);
      goBtn.classList.toggle('bad', !status.allValid);
    }

    function unitFromBearing(bearingDeg) {
      const r = toRad(bearingDeg);
      return { x: Math.sin(r), y: Math.cos(r) };
    }

    function bearingFromTo(a, b) {
      const east = b.x - a.x;
      const north = b.y - a.y;
      return norm360(toDeg(Math.atan2(east, north)));
    }

    function makeDistances(legLength) {
      const distances = [0.5];
      for (let d = 1; d <= Math.floor(legLength); d++) {
        distances.push(d);
      }

      const last = distances[distances.length - 1];
      if (Math.abs(legLength - last) > 0.000001) {
        distances.push(legLength);
      }

      return [...new Set(distances.map(d => Number(d.toFixed(3))))];
    }

    function calculate(values) {
      const courseUnit = unitFromBearing(values.course);
      const fixUnit = unitFromBearing(values.fixBearing);

      const fix = {
        x: values.fixRange * fixUnit.x,
        y: values.fixRange * fixUnit.y
      };

      return makeDistances(values.legLength).map(d => {
        const ship = {
          x: -d * courseUnit.x,
          y: -d * courseUnit.y
        };

        return {
          distanceToWheelOver: d,
          bearing: bearingFromTo(ship, fix)
        };
      });
    }

    function renderTable(rows) {
      resultsBody.innerHTML = '';

      rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${fmtC(row.distanceToWheelOver)}</td>
          <td><strong>${fmtBearing(row.bearing)}</strong></td>
        `;
        resultsBody.appendChild(tr);
      });
    }

    function run() {
      updateButtonState();
      const status = getValidation();

      if (!status.allValid) {
        resultsBody.innerHTML = '';
        return;
      }

      renderTable(calculate(status.values));
    }

    Object.values(inputs).forEach(input => {
      input.addEventListener('input', updateButtonState);
    });

    goBtn.addEventListener('click', run);
    updateButtonState();
  </script>
</body>
</html>
