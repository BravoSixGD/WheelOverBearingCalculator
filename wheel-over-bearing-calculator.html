<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel Over Bearing Calculator</title>
  <link rel="stylesheet" href="assets/theme.css">

  <style>
    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 16px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
      background: var(--bg-input);
      color: var(--text-main);
    }

    th,
    td {
      border: 1px solid var(--border-main);
      padding: 12px;
      text-align: center;
      font-size: 16px;
    }

    th {
      background: var(--bg-card);
      color: var(--text-main);
      font-weight: bold;
    }

    td {
      color: #e9f1f7;
    }

    @media (min-width: 760px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      th,
      td {
        padding: 9px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <a href="index.html" class="home-btn">×</a>

  <div class="app-container">
    <h1 class="page-title">Wheel Over Bearing Calculator</h1>

    <div class="card">
      <div class="card-title">Inputs</div>

      <div class="input-grid">
        <div>
          <label>Course of Ship</label>
          <input id="course" type="number" inputmode="decimal" step="0.1" placeholder="090">
        </div>

        <div>
          <label>Bearing of Fixing mark from wheel over</label>
          <input id="fixBearing" type="number" inputmode="decimal" step="0.1" placeholder="045">
        </div>

        <div>
          <label>Range of fixing mark from wheel over (in Cables)</label>
          <input id="fixRange" type="number" inputmode="decimal" step="0.1" placeholder="5">
        </div>

        <div>
          <label>Length of Leg (in cables)</label>
          <input id="legLength" type="number" inputmode="decimal" step="0.1" placeholder="10">
        </div>
      </div>

      <button id="goBtn" class="go-btn" onclick="calculate()">GO</button>

      <div id="result" class="result">
        Enter values to generate bearing table.
      </div>
    </div>
  </div>

  <script>
    const courseInput = document.getElementById("course");
    const fixBearingInput = document.getElementById("fixBearing");
    const fixRangeInput = document.getElementById("fixRange");
    const legLengthInput = document.getElementById("legLength");
    const goBtn = document.getElementById("goBtn");
    const result = document.getElementById("result");

    document.querySelectorAll("input").forEach(input => {
      input.addEventListener("input", updateButton);
    });

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function toDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function normalizeBearing(value) {
      return ((value % 360) + 360) % 360;
    }

    function formatBearing(value) {
      const bearing = normalizeBearing(value);
      return bearing.toFixed(1).padStart(5, "0");
    }

    function isValid() {
      const course = Number(courseInput.value);
      const fixBearing = Number(fixBearingInput.value);
      const fixRange = Number(fixRangeInput.value);
      const legLength = Number(legLengthInput.value);

      if (!Number.isFinite(course) || course < 0 || course >= 360) return false;
      if (!Number.isFinite(fixBearing) || fixBearing < 0 || fixBearing >= 360) return false;
      if (!Number.isFinite(fixRange) || fixRange <= 0) return false;
      if (!Number.isFinite(legLength) || legLength <= 0) return false;

      return true;
    }

    function updateButton() {
      if (isValid()) {
        goBtn.classList.add("valid");
      } else {
        goBtn.classList.remove("valid");
      }
    }

    function calculateBearingFromShip(course, fixBearing, fixRange, distanceToWheelOver) {
      const courseRad = toRad(course);
      const fixBearingRad = toRad(fixBearing);

      const fixX = fixRange * Math.sin(fixBearingRad);
      const fixY = fixRange * Math.cos(fixBearingRad);

      const shipX = -distanceToWheelOver * Math.sin(courseRad);
      const shipY = -distanceToWheelOver * Math.cos(courseRad);

      const dx = fixX - shipX;
      const dy = fixY - shipY;

      const bearing = toDeg(Math.atan2(dx, dy));
      return normalizeBearing(bearing);
    }

    function buildDistances(legLength) {
      const distances = [];

      distances.push(legLength);

      for (let d = Math.floor(legLength); d >= 1; d--) {
        distances.push(d);
      }

      if (legLength >= 0.5) {
        distances.push(0.5);
      }

      distances.push(0);

      return [...new Set(distances.map(d => Number(d.toFixed(1))))]
        .sort((a, b) => b - a);
    }

    function calculate() {
      if (!isValid()) {
        result.innerHTML = `<span class="warning">Recheck the values entered.</span>`;
        updateButton();
        return;
      }

      const course = Number(courseInput.value);
      const fixBearing = Number(fixBearingInput.value);
      const fixRange = Number(fixRangeInput.value);
      const legLength = Number(legLengthInput.value);

      const distances = buildDistances(legLength);

      let tableHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Distance to Wheel Over (Cables)</th>
                <th>Bearing of Fixing Mark</th>
              </tr>
            </thead>
            <tbody>
      `;

      distances.forEach(distance => {
        const bearing = calculateBearingFromShip(course, fixBearing, fixRange, distance);

        tableHTML += `
          <tr>
            <td>${distance.toFixed(1)} C</td>
            <td>${formatBearing(bearing)}°</td>
          </tr>
        `;
      });

      tableHTML += `
            </tbody>
          </table>
        </div>
      `;

      result.innerHTML = tableHTML;
      updateButton();
    }

    updateButton();
  </script>
</body>
</html>
