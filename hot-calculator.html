<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>HOT and TOT Calculator</title>

  <link rel="stylesheet" href="assets/theme.css">
</head>

<body>
  <a
    href="index.html"
    class="home-btn"
    aria-label="Back to home"
  >×</a>

  <div class="app-container">
    <h1 class="page-title">HOT and TOT Calculator</h1>

    <div class="card">
      <div class="card-title">Tide Data</div>

      <div class="tide-row">
        <div>
          <label for="type1">Tide 1</label>

          <select id="type1">
            <option value="HW">HW</option>
            <option value="LW">LW</option>
          </select>
        </div>

        <div>
          <label for="time1">Time</label>

          <input
            id="time1"
            type="text"
            inputmode="numeric"
            maxlength="5"
            placeholder="0704"
            autocomplete="off"
          >
        </div>

        <div>
          <label for="height1">Height</label>

          <input
            id="height1"
            type="number"
            inputmode="decimal"
            step="0.01"
            placeholder="0.7"
          >
        </div>
      </div>

      <div class="tide-row">
        <div>
          <label for="type2">Tide 2</label>

          <select id="type2">
            <option value="LW">LW</option>
            <option value="HW">HW</option>
          </select>
        </div>

        <div>
          <label for="time2">Time</label>

          <input
            id="time2"
            type="text"
            inputmode="numeric"
            maxlength="5"
            placeholder="1112"
            autocomplete="off"
          >
        </div>

        <div>
          <label for="height2">Height</label>

          <input
            id="height2"
            type="number"
            inputmode="decimal"
            step="0.01"
            placeholder="0.6"
          >
        </div>
      </div>

      <div class="tide-row">
        <div>
          <label for="type3">Tide 3</label>

          <select id="type3">
            <option value="HW">HW</option>
            <option value="LW">LW</option>
          </select>
        </div>

        <div>
          <label for="time3">Time</label>

          <input
            id="time3"
            type="text"
            inputmode="numeric"
            maxlength="5"
            placeholder="1701"
            autocomplete="off"
          >
        </div>

        <div>
          <label for="height3">Height</label>

          <input
            id="height3"
            type="number"
            inputmode="decimal"
            step="0.01"
            placeholder="0.8"
          >
        </div>
      </div>

      <div class="tide-row">
        <div>
          <label for="type4">Tide 4</label>

          <select id="type4">
            <option value="LW">LW</option>
            <option value="HW">HW</option>
          </select>
        </div>

        <div>
          <label for="time4">Time</label>

          <input
            id="time4"
            type="text"
            inputmode="numeric"
            maxlength="5"
            placeholder="0041"
            autocomplete="off"
          >
        </div>

        <div>
          <label for="height4">Height</label>

          <input
            id="height4"
            type="number"
            inputmode="decimal"
            step="0.01"
            placeholder="0.2"
          >
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Calculations</div>

      <div class="grid">
        <div>
          <label for="targetTime">
            Time for Height of Tide
          </label>

          <input
            id="targetTime"
            type="text"
            inputmode="numeric"
            maxlength="5"
            placeholder="1430"
            autocomplete="off"
          >
        </div>

        <div>
          <label for="targetHeight">
            HOT for Time of Tide
          </label>

          <input
            id="targetHeight"
            type="number"
            inputmode="decimal"
            step="0.01"
            placeholder="0.7"
          >
        </div>
      </div>

      <button
        id="goBtn"
        class="go-btn"
        type="button"
      >
        GO
      </button>

      <div id="result" class="result">
        Enter four tides and the required time or height.
      </div>
    </div>
  </div>

  <script>
    "use strict";

    /*
      Interpolation curve expressed as:

      p = fraction of time elapsed through the tidal period
      c = fraction of the tidal range completed

      Values between table positions are found by linear interpolation.
    */
    const INTERPOLATION_TABLE = [
      { p: 0.00, c: 0.000000 },
      { p: 0.05, c: 0.005833 },
      { p: 0.10, c: 0.024167 },
      { p: 0.15, c: 0.054167 },
      { p: 0.20, c: 0.095833 },
      { p: 0.25, c: 0.146667 },
      { p: 0.30, c: 0.205833 },
      { p: 0.35, c: 0.273333 },
      { p: 0.40, c: 0.345833 },
      { p: 0.45, c: 0.421667 },
      { p: 0.50, c: 0.500000 },
      { p: 0.55, c: 0.578333 },
      { p: 0.60, c: 0.654167 },
      { p: 0.65, c: 0.726667 },
      { p: 0.70, c: 0.794167 },
      { p: 0.75, c: 0.853333 },
      { p: 0.80, c: 0.904167 },
      { p: 0.85, c: 0.945833 },
      { p: 0.90, c: 0.975833 },
      { p: 0.95, c: 0.994167 },
      { p: 1.00, c: 1.000000 }
    ];

    const goBtn = document.getElementById("goBtn");
    const resultBox = document.getElementById("result");
    const targetTimeInput = document.getElementById("targetTime");
    const targetHeightInput = document.getElementById("targetHeight");

    const tideControls = [];

    for (let index = 1; index <= 4; index++) {
      tideControls.push({
        type: document.getElementById(`type${index}`),
        time: document.getElementById(`time${index}`),
        height: document.getElementById(`height${index}`)
      });
    }

    document
      .querySelectorAll("input, select")
      .forEach((control) => {
        control.addEventListener("input", updateButton);
        control.addEventListener("change", updateButton);
      });

    goBtn.addEventListener("click", calculate);

    function parseTime(value) {
      let cleanValue = String(value)
        .trim()
        .replace(":", "");

      if (!/^\d{3,4}$/.test(cleanValue)) {
        return null;
      }

      if (cleanValue.length === 3) {
        cleanValue = `0${cleanValue}`;
      }

      const hours = Number(cleanValue.slice(0, 2));
      const minutes = Number(cleanValue.slice(2, 4));

      if (
        !Number.isInteger(hours) ||
        !Number.isInteger(minutes) ||
        hours < 0 ||
        hours > 23 ||
        minutes < 0 ||
        minutes > 59
      ) {
        return null;
      }

      return (hours * 60) + minutes;
    }

    function formatTime(totalMinutes) {
      const roundedMinutes = Math.round(totalMinutes);

      const dayNumber = Math.floor(roundedMinutes / 1440);

      const clockMinutes =
        ((roundedMinutes % 1440) + 1440) % 1440;

      const hours = Math.floor(clockMinutes / 60);
      const minutes = clockMinutes % 60;

      const clockText =
        `${String(hours).padStart(2, "0")}` +
        `${String(minutes).padStart(2, "0")}`;

      if (dayNumber <= 0) {
        return clockText;
      }

      return `${clockText} (+${dayNumber} day)`;
    }

    function readOptionalNumber(input) {
      const text = input.value.trim();

      if (text === "") {
        return null;
      }

      const value = Number(text);

      if (!Number.isFinite(value)) {
        return Number.NaN;
      }

      return value;
    }

    function getTideData() {
      const tides = [];

      for (const control of tideControls) {
        const type = control.type.value;
        const rawTime = parseTime(control.time.value);
        const height = readOptionalNumber(control.height);

        if (
          rawTime === null ||
          height === null ||
          !Number.isFinite(height) ||
          height < 0
        ) {
          return {
            valid: false,
            message: "Recheck the four tide times and heights."
          };
        }

        tides.push({
          type,
          rawTime,
          time: rawTime,
          height
        });
      }

      /*
        Convert the four clock times into one continuous chronological
        sequence. A later clock time that is smaller than the preceding
        one is treated as being after midnight.
      */
      for (let index = 1; index < tides.length; index++) {
        while (tides[index].time <= tides[index - 1].time) {
          tides[index].time += 1440;
        }
      }

      const highWaterCount =
        tides.filter((tide) => tide.type === "HW").length;

      const lowWaterCount =
        tides.filter((tide) => tide.type === "LW").length;

      if (highWaterCount !== 2 || lowWaterCount !== 2) {
        return {
          valid: false,
          message: "Enter two HW and two LW entries."
        };
      }

      for (let index = 0; index < tides.length - 1; index++) {
        const start = tides[index];
        const end = tides[index + 1];

        if (start.type === end.type) {
          return {
            valid: false,
            message: "HW and LW entries must alternate."
          };
        }

        const duration = end.time - start.time;

        if (duration <= 0 || duration > 720) {
          return {
            valid: false,
            message: "Recheck the chronological order of the tide times."
          };
        }

        /*
          A genuine small tidal range is valid.

          Only a zero range is rejected because interpolation cannot
          determine a changing height when both bounding heights are equal.
        */
        const tidalRange =
          Math.abs(end.height - start.height);

        if (tidalRange <= 0) {
          return {
            valid: false,
            message:
              "Consecutive HW and LW heights cannot be identical."
          };
        }

        /*
          Confirm that the selected HW is higher than the adjacent LW.
        */
        if (
          start.type === "HW" &&
          start.height <= end.height
        ) {
          return {
            valid: false,
            message:
              "Recheck the tide types or heights. HW must be higher than LW."
          };
        }

        if (
          start.type === "LW" &&
          start.height >= end.height
        ) {
          return {
            valid: false,
            message:
              "Recheck the tide types or heights. LW must be lower than HW."
          };
        }
      }

      return {
        valid: true,
        tides
      };
    }

    function interpolateRangeFraction(timeFraction) {
      if (timeFraction <= 0) {
        return 0;
      }

      if (timeFraction >= 1) {
        return 1;
      }

      for (
        let index = 0;
        index < INTERPOLATION_TABLE.length - 1;
        index++
      ) {
        const lower = INTERPOLATION_TABLE[index];
        const upper = INTERPOLATION_TABLE[index + 1];

        if (
          timeFraction >= lower.p &&
          timeFraction <= upper.p
        ) {
          const position =
            (timeFraction - lower.p) /
            (upper.p - lower.p);

          return lower.c +
            position * (upper.c - lower.c);
        }
      }

      return null;
    }

    function reverseInterpolateTimeFraction(rangeFraction) {
      if (rangeFraction <= 0) {
        return 0;
      }

      if (rangeFraction >= 1) {
        return 1;
      }

      for (
        let index = 0;
        index < INTERPOLATION_TABLE.length - 1;
        index++
      ) {
        const lower = INTERPOLATION_TABLE[index];
        const upper = INTERPOLATION_TABLE[index + 1];

        if (
          rangeFraction >= lower.c &&
          rangeFraction <= upper.c
        ) {
          const position =
            (rangeFraction - lower.c) /
            (upper.c - lower.c);

          return lower.p +
            position * (upper.p - lower.p);
        }
      }

      return null;
    }

    function findPeriodForTime(tides, rawTargetTime) {
      /*
        A 24-hour target time may belong to the first displayed day
        or the next day. Test both sensible representations.
      */
      const candidates = [
        rawTargetTime,
        rawTargetTime + 1440
      ];

      for (const candidate of candidates) {
        for (
          let index = 0;
          index < tides.length - 1;
          index++
        ) {
          const start = tides[index];
          const end = tides[index + 1];

          if (
            candidate >= start.time &&
            candidate <= end.time
          ) {
            return {
              start,
              end,
              targetTime: candidate
            };
          }
        }
      }

      return null;
    }

    function calculateHeightOfTide(tides, rawTargetTime) {
      const period = findPeriodForTime(
        tides,
        rawTargetTime
      );

      if (!period) {
        return null;
      }

      const duration =
        period.end.time - period.start.time;

      const elapsed =
        period.targetTime - period.start.time;

      const timeFraction = elapsed / duration;

      const completedRangeFraction =
        interpolateRangeFraction(timeFraction);

      if (completedRangeFraction === null) {
        return null;
      }

      const heightDifference =
        period.end.height - period.start.height;

      const calculatedHeight =
        period.start.height +
        (heightDifference * completedRangeFraction);

      return {
        height: calculatedHeight,
        targetTime: period.targetTime,
        start: period.start,
        end: period.end
      };
    }

    function calculateTimeOfTide(tides, targetHeight) {
      const answers = [];
      const tolerance = 1e-9;

      for (
        let index = 0;
        index < tides.length - 1;
        index++
      ) {
        const start = tides[index];
        const end = tides[index + 1];

        const minimumHeight =
          Math.min(start.height, end.height);

        const maximumHeight =
          Math.max(start.height, end.height);

        if (
          targetHeight < minimumHeight - tolerance ||
          targetHeight > maximumHeight + tolerance
        ) {
          continue;
        }

        const totalHeightChange =
          end.height - start.height;

        const rangeFraction =
          (targetHeight - start.height) /
          totalHeightChange;

        const timeFraction =
          reverseInterpolateTimeFraction(rangeFraction);

        if (timeFraction === null) {
          continue;
        }

        const duration =
          end.time - start.time;

        const calculatedTime =
          start.time + (duration * timeFraction);

        answers.push({
          time: calculatedTime,
          start,
          end
        });
      }

      return answers;
    }

    function validateQuestion(tides) {
      const targetTimeText =
        targetTimeInput.value.trim();

      const targetHeightText =
        targetHeightInput.value.trim();

      if (
        targetTimeText === "" &&
        targetHeightText === ""
      ) {
        return {
          valid: false,
          message:
            "Enter a time for HOT or a height for TOT."
        };
      }

      if (targetTimeText !== "") {
        const rawTargetTime =
          parseTime(targetTimeText);

        if (rawTargetTime === null) {
          return {
            valid: false,
            message: "Recheck the time entered for HOT."
          };
        }

        const hotResult =
          calculateHeightOfTide(
            tides,
            rawTargetTime
          );

        if (!hotResult) {
          return {
            valid: false,
            message:
              "The requested time is outside the four-tide period."
          };
        }
      }

      if (targetHeightText !== "") {
        const targetHeight =
          Number(targetHeightText);

        if (
          !Number.isFinite(targetHeight) ||
          targetHeight < 0
        ) {
          return {
            valid: false,
            message:
              "Recheck the height entered for TOT."
          };
        }

        const totResults =
          calculateTimeOfTide(
            tides,
            targetHeight
          );

        if (totResults.length === 0) {
          return {
            valid: false,
            message:
              "The requested HOT is outside all provided tidal ranges."
          };
        }
      }

      return {
        valid: true
      };
    }

    function isValid() {
      const tideData = getTideData();

      if (!tideData.valid) {
        return false;
      }

      return validateQuestion(tideData.tides).valid;
    }

    function updateButton() {
      goBtn.classList.toggle(
        "valid",
        isValid()
      );
    }

    function showWarning(message) {
      resultBox.innerHTML =
        `<span class="warning">${message}</span>`;
    }

    function calculate() {
      const tideData = getTideData();

      if (!tideData.valid) {
        showWarning(tideData.message);
        updateButton();
        return;
      }

      const tides = tideData.tides;

      const questionValidation =
        validateQuestion(tides);

      if (!questionValidation.valid) {
        showWarning(questionValidation.message);
        updateButton();
        return;
      }

      const targetTimeText =
        targetTimeInput.value.trim();

      const targetHeightText =
        targetHeightInput.value.trim();

      let output = "";

      if (targetTimeText !== "") {
        const rawTargetTime =
          parseTime(targetTimeText);

        const hotResult =
          calculateHeightOfTide(
            tides,
            rawTargetTime
          );

        output += `
          <div class="success">Height of Tide</div>
          Time: ${formatTime(hotResult.targetTime)}<br>
          HOT: ${hotResult.height.toFixed(2)} m<br>
          Period:
          ${hotResult.start.type}
          ${formatTime(hotResult.start.time)}
          to
          ${hotResult.end.type}
          ${formatTime(hotResult.end.time)}
          <br><br>
        `;
      }

      if (targetHeightText !== "") {
        const targetHeight =
          Number(targetHeightText);

        const totResults =
          calculateTimeOfTide(
            tides,
            targetHeight
          );

        output += `
          <div class="success">Time of Tide</div>
          Required HOT: ${targetHeight.toFixed(2)} m<br>
        `;

        totResults.forEach((answer, index) => {
          output += `
            Time ${index + 1}:
            ${formatTime(answer.time)}<br>
            Period:
            ${answer.start.type}
            ${formatTime(answer.start.time)}
            to
            ${answer.end.type}
            ${formatTime(answer.end.time)}
            <br>
          `;
        });
      }

      resultBox.innerHTML = output;
      updateButton();
    }

    updateButton();
  </script>
</body>
</html>
