<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Height of Tide Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .note {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .box {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      background: #fafafa;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 9px;
      margin-top: 5px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #1f6feb;
      color: white;
    }

    button:hover {
      background: #1558bd;
    }

    #result {
      margin-top: 25px;
      padding: 18px;
      border-radius: 8px;
      background: #eef7ee;
      border: 1px solid #8bc98b;
      display: none;
      line-height: 1.6;
    }

    .error {
      background: #fff0f0 !important;
      border-color: #d66 !important;
      color: #900;
    }

    .final {
      font-size: 22px;
      font-weight: bold;
      color: #064b06;
    }
  </style>
</head>

<body>
<a href="index.html" class="home-btn">×</a>
  <div class="container">
    <h1>Height of Tide Calculator</h1>
    <p class="note">
      Enter tide-table times in 24-hour format, for example 0345, 1410, 2355.
      Heights should be entered in metres.
    </p>

    <div class="grid">
      <div class="box">
        <h2>High Waters</h2>

        <label>HW 1 Time</label>
        <input type="text" id="hw1Time" placeholder="Example: 0430">

        <label>HW 1 Height</label>
        <input type="text" id="hw1Height" placeholder="Example: 5.8">

        <label>HW 2 Time</label>
        <input type="text" id="hw2Time" placeholder="Example: 1655">

        <label>HW 2 Height</label>
        <input type="text" id="hw2Height" placeholder="Example: 5.5">
      </div>

      <div class="box">
        <h2>Low Waters</h2>

        <label>LW 1 Time</label>
        <input type="text" id="lw1Time" placeholder="Example: 1030">

        <label>LW 1 Height</label>
        <input type="text" id="lw1Height" placeholder="Example: 1.2">

        <label>LW 2 Time</label>
        <input type="text" id="lw2Time" placeholder="Example: 2240">

        <label>LW 2 Height</label>
        <input type="text" id="lw2Height" placeholder="Example: 1.5">
      </div>
    </div>

    <div class="box" style="margin-top: 20px;">
      <h2>Required Time</h2>

      <label>Time for which height of tide is required</label>
      <input type="text" id="requiredTime" placeholder="Example: 1230">

      <button onclick="calculateHeight()">GO</button>
    </div>

    <div id="result"></div>
  </div>


  <script>
    /*
      Interpolation factors based on the tide interpolation table columns.

      Columns represent interval from nearest HW/LW as percentage of duration:
      0%, 5%, 10%, 15%, ... 50%

      Correction = Range × Factor

      If interval falls between two columns, linear interpolation is applied.
    */

    const factorTable = [
      { p: 0.00, f: 0.000 },
      { p: 0.05, f: 0.006 },
      { p: 0.10, f: 0.024 },
      { p: 0.15, f: 0.054 },
      { p: 0.20, f: 0.095 },
      { p: 0.25, f: 0.146 },
      { p: 0.30, f: 0.206 },
      { p: 0.35, f: 0.273 },
      { p: 0.40, f: 0.345 },
      { p: 0.45, f: 0.422 },
      { p: 0.50, f: 0.500 }
    ];

    function parseTime(value) {
      value = value.trim().replace(":", "");

      if (!/^\d{3,4}$/.test(value)) {
        return null;
      }

      if (value.length === 3) {
        value = "0" + value;
      }

      const hours = Number(value.slice(0, 2));
      const minutes = Number(value.slice(2, 4));

      if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
        return null;
      }

      return hours * 60 + minutes;
    }

    function parseHeight(value) {
      const h = Number(value.trim());
      if (isNaN(h)) return null;
      return h;
    }

    function formatMinutes(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return `${h}h ${String(m).padStart(2, "0")}m`;
    }

    function formatClock(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return `${String(h).padStart(2, "0")}${String(m).padStart(2, "0")}`;
    }

    function showResult(html, isError = false) {
      const result = document.getElementById("result");
      result.innerHTML = html;
      result.style.display = "block";

      if (isError) {
        result.classList.add("error");
      } else {
        result.classList.remove("error");
      }
    }

    function getInterpolatedFactor(intervalFromNearest, duration) {
      const actualPercentage = intervalFromNearest / duration;

      if (actualPercentage <= 0) return 0;
      if (actualPercentage >= 0.5) return 0.5;

      let lower = factorTable[0];
      let upper = factorTable[factorTable.length - 1];

      for (let i = 0; i < factorTable.length - 1; i++) {
        if (
          actualPercentage >= factorTable[i].p &&
          actualPercentage <= factorTable[i + 1].p
        ) {
          lower = factorTable[i];
          upper = factorTable[i + 1];
          break;
        }
      }

      const proportion =
        (actualPercentage - lower.p) / (upper.p - lower.p);

      const interpolatedFactor =
        lower.f + proportion * (upper.f - lower.f);

      return interpolatedFactor;
    }

    function calculateHeight() {
      const tides = [
        {
          type: "HW",
          name: "HW 1",
          time: parseTime(document.getElementById("hw1Time").value),
          height: parseHeight(document.getElementById("hw1Height").value)
        },
        {
          type: "HW",
          name: "HW 2",
          time: parseTime(document.getElementById("hw2Time").value),
          height: parseHeight(document.getElementById("hw2Height").value)
        },
        {
          type: "LW",
          name: "LW 1",
          time: parseTime(document.getElementById("lw1Time").value),
          height: parseHeight(document.getElementById("lw1Height").value)
        },
        {
          type: "LW",
          name: "LW 2",
          time: parseTime(document.getElementById("lw2Time").value),
          height: parseHeight(document.getElementById("lw2Height").value)
        }
      ];

      const requiredTime = parseTime(
        document.getElementById("requiredTime").value
      );

      if (requiredTime === null) {
        showResult("Invalid required time. Enter time like 0345 or 1430.", true);
        return;
      }

      for (const tide of tides) {
        if (tide.time === null || tide.height === null) {
          showResult("Please enter all HW/LW times and heights correctly.", true);
          return;
        }
      }

      tides.sort((a, b) => a.time - b.time);

      let startTide = null;
      let endTide = null;

      for (let i = 0; i < tides.length - 1; i++) {
        if (requiredTime >= tides[i].time && requiredTime <= tides[i + 1].time) {
          startTide = tides[i];
          endTide = tides[i + 1];
          break;
        }
      }

      if (!startTide || !endTide) {
        showResult(
          "Required time is outside the entered tide interval. Enter the previous or next day's tide also if the time lies before the first tide or after the last tide.",
          true
        );
        return;
      }

      if (startTide.type === endTide.type) {
        showResult(
          "The selected interval is invalid because two neighbouring tides are both HW or both LW.",
          true
        );
        return;
      }

      if (requiredTime === startTide.time) {
        showResult(`
          Exact tide time entered.<br>
          <span class="final">Height of Tide = ${startTide.height.toFixed(2)} m</span>
        `);
        return;
      }

      if (requiredTime === endTide.time) {
        showResult(`
          Exact tide time entered.<br>
          <span class="final">Height of Tide = ${endTide.height.toFixed(2)} m</span>
        `);
        return;
      }

      const duration = endTide.time - startTide.time;
      const intervalFromStart = requiredTime - startTide.time;
      const intervalFromEnd = endTide.time - requiredTime;

      const nearestTide =
        intervalFromStart <= intervalFromEnd ? startTide : endTide;

      const intervalFromNearest =
        Math.min(intervalFromStart, intervalFromEnd);

      const highWater =
        startTide.type === "HW" ? startTide : endTide;

      const lowWater =
        startTide.type === "LW" ? startTide : endTide;

      const range = highWater.height - lowWater.height;

      if (range < 0) {
        showResult("Invalid heights. HW height should be greater than LW height.", true);
        return;
      }

      const factor = getInterpolatedFactor(intervalFromNearest, duration);
      const correction = range * factor;

      let finalHeight;

      if (nearestTide.type === "LW") {
        finalHeight = nearestTide.height + correction;
      } else {
        finalHeight = nearestTide.height - correction;
      }

      const html = `
        <b>Selected tide interval:</b><br>
        ${startTide.name} / ${startTide.type}: ${formatClock(startTide.time)}, Height ${startTide.height.toFixed(2)} m<br>
        ${endTide.name} / ${endTide.type}: ${formatClock(endTide.time)}, Height ${endTide.height.toFixed(2)} m<br><br>

        <b>Duration of rise/fall:</b> ${formatMinutes(duration)}<br>
        <b>Required time:</b> ${formatClock(requiredTime)}<br>
        <b>Nearest tide used:</b> ${nearestTide.name} / ${nearestTide.type}<br>
        <b>Interval from nearest HW/LW:</b> ${formatMinutes(intervalFromNearest)}<br>
        <b>Range of tide:</b> ${range.toFixed(2)} m<br>
        <b>Interpolated table factor:</b> ${factor.toFixed(4)}<br>
        <b>Correction:</b> ${correction.toFixed(2)} m<br><br>

        <span class="final">Height of Tide = ${finalHeight.toFixed(2)} m</span>
      `;

      showResult(html);
    }
  </script>

</body>
</html>
